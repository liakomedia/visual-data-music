<body>
<div id="graph"></div>
<div id="loading">Assembling the world of music…</div>

<header>
  <div class="brand">
    <h1>Visual Data <span class="d">Music</span></h1>
    <div class="sub">The whole world of music in one interactive map — industry, business, culture, rights, genres, instruments, production, performance and careers.</div>
  </div>
  <div id="controls">
    <button id="bAll" title="Show every bubble at once and keep them all visible — clicking then only moves the camera">Show all</button>
    <button id="bFit" title="Fit everything currently open into view">Fit view</button>
    <button id="bReset" title="Collapse back to the domains">Reset</button>
  </div>
  <div id="search"><input id="q" type="search" placeholder="Search a genre, deal, role, instrument…" autocomplete="off"/></div>
</header>
<div id="crumbs"></div>

<div id="panel">
  <div class="close" id="pclose">×</div>
  <div class="ph" id="pph"></div>
  <div class="bd" id="pbd"></div>
</div>

<button id="legend-btn" title="Domains — show / hide">◈ Legend</button>
